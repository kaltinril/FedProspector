openapi: "3.1.0"
info:
  title: FedProspect API
  version: "1.0.0"
  description: >
    Federal contract prospecting platform API. Provides endpoints for searching
    federal opportunities, awards, entities, managing prospects, proposals,
    saved searches, organization profiles, and administrative functions.

servers:
  - url: https://localhost:5001/api
    description: Local development server

tags:
  - name: Auth
    description: Authentication, registration, and user profile management
  - name: Dashboard
    description: Prospect pipeline dashboard
  - name: Opportunities
    description: Federal opportunity search, intelligence, and analysis
  - name: Awards
    description: Federal contract award search, market share, and expiring contracts
  - name: Entities
    description: SAM.gov entity search, competitor profiles, and exclusion checks
  - name: Prospects
    description: Prospect pipeline management (create, status, notes, team, scoring)
  - name: Proposals
    description: Proposal tracking, documents, and milestones
  - name: SavedSearches
    description: Saved search management and execution
  - name: Subawards
    description: Subaward data and teaming partner search
  - name: Organization
    description: Organization settings, profile, NAICS, certifications, past performance, and entity linking
  - name: Notifications
    description: User notification management
  - name: Reference
    description: Reference data lookups (NAICS, certifications)
  - name: Admin
    description: System administration (ETL status, user management, organizations)
  - name: FederalHierarchy
    description: Federal agency hierarchy browsing, tree navigation, and refresh
  - name: Health
    description: System health checks

security:
  - cookieAuth: []

paths:
  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  /health:
    get:
      tags: [Health]
      summary: System health check
      description: Returns overall system health including database connectivity and ETL data freshness.
      security: []
      operationId: getHealth
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [Healthy, Degraded, Unhealthy]
                  database:
                    $ref: "#/components/schemas/HealthComponent"
                  etlFreshness:
                    $ref: "#/components/schemas/HealthComponent"

  # ---------------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------------
  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: Authenticate a user and return a JWT token. Sets httpOnly cookies for browser clients.
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Missing email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"

  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      description: Revoke the current session token and clear auth cookies.
      security: []
      operationId: logout
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Register a new user account using an invite code.
      security: []
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "429":
          description: Too many registration attempts

  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Refresh access token using the refresh_token httpOnly cookie.
      security: []
      operationId: refreshToken
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: No or invalid refresh token

  /v1/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password
      description: Change the current user's password. Revokes all active sessions.
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Invalid current password or weak new password
        "401":
          description: Not authenticated
        "404":
          description: User not found

  /v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      description: Get the authenticated user's profile information.
      operationId: getProfile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileDto"
        "401":
          description: Not authenticated
        "404":
          description: User not found
    patch:
      tags: [Auth]
      summary: Update current user profile
      description: Update the current user's display name and/or email.
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileDto"
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "404":
          description: User not found

  # ---------------------------------------------------------------------------
  # Dashboard
  # ---------------------------------------------------------------------------
  /v1/dashboard:
    get:
      tags: [Dashboard]
      summary: Get prospect pipeline dashboard
      description: Returns status counts, due items, and workload for the current organization.
      operationId: getDashboard
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardDto"
        "401":
          description: Not authenticated

  # ---------------------------------------------------------------------------
  # Opportunities
  # ---------------------------------------------------------------------------
  /v1/opportunities:
    get:
      tags: [Opportunities]
      summary: Search opportunities
      description: Search federal opportunities with filters and pagination.
      operationId: searchOpportunities
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
        - name: naics
          in: query
          schema:
            type: string
        - name: setAside
          in: query
          schema:
            type: string
        - name: solicitation
          in: query
          schema:
            type: string
        - name: daysOut
          in: query
          schema:
            type: integer
        - name: openOnly
          in: query
          schema:
            type: boolean
            default: true
        - name: department
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortDescending"
      responses:
        "200":
          description: Paged list of opportunities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedOpportunitySearchResponse"
        "401":
          description: Not authenticated

  /v1/opportunities/targets:
    get:
      tags: [Opportunities]
      summary: Get target opportunities
      description: Search target opportunities filtered by value range, NAICS sector, and other criteria.
      operationId: getTargetOpportunities
      parameters:
        - name: minValue
          in: query
          schema:
            type: number
            format: decimal
        - name: maxValue
          in: query
          schema:
            type: number
            format: decimal
        - name: naicsSector
          in: query
          schema:
            type: string
        - name: setAside
          in: query
          schema:
            type: string
        - name: naics
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortDescending"
      responses:
        "200":
          description: Paged list of target opportunities
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Not authenticated

  /v1/opportunities/export:
    get:
      tags: [Opportunities]
      summary: Export opportunities as CSV
      description: Export opportunity search results as a CSV file. Accepts the same parameters as the search endpoint.
      operationId: exportOpportunitiesCsv
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
        - name: naics
          in: query
          schema:
            type: string
        - name: setAside
          in: query
          schema:
            type: string
        - name: solicitation
          in: query
          schema:
            type: string
        - name: daysOut
          in: query
          schema:
            type: integer
        - name: openOnly
          in: query
          schema:
            type: boolean
            default: true
        - name: department
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortDescending"
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401":
          description: Not authenticated

  /v1/opportunities/recommended:
    get:
      tags: [Opportunities]
      summary: Get recommended opportunities
      description: Get opportunities scored and ranked for the current organization's profile.
      operationId: getRecommendedOpportunities
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of recommended opportunities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecommendedOpportunityDto"
        "401":
          description: Not authenticated

  /v1/opportunities/pwin/batch:
    post:
      tags: [Opportunities]
      summary: Calculate batch pWin
      description: Calculate probability of win for multiple opportunities in one request (max 200).
      operationId: calculateBatchPWin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchPWinRequest"
      responses:
        "200":
          description: Batch pWin results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPWinResponse"
        "400":
          description: Too many notice IDs (max 200)
        "401":
          description: Not authenticated

  /v1/opportunities/{noticeId}:
    get:
      tags: [Opportunities]
      summary: Get opportunity detail
      description: Get full detail for a single opportunity by notice ID.
      operationId: getOpportunityDetail
      parameters:
        - name: noticeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Opportunity detail
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Not authenticated
        "404":
          description: Opportunity not found

  /v1/opportunities/{noticeId}/pwin:
    get:
      tags: [Opportunities]
      summary: Calculate pWin
      description: Calculate probability of win for an opportunity against the current organization's profile.
      operationId: calculatePWin
      parameters:
        - name: noticeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: pWin result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PWinResultDto"
        "401":
          description: Not authenticated

  /v1/opportunities/{noticeId}/incumbent:
    get:
      tags: [Opportunities]
      summary: Get incumbent analysis
      description: Identifies current contract holder and vulnerability signals for an opportunity.
      operationId: getIncumbentAnalysis
      parameters:
        - name: noticeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Incumbent analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncumbentAnalysisDto"
        "401":
          description: Not authenticated

  /v1/opportunities/{noticeId}/competitive-landscape:
    get:
      tags: [Opportunities]
      summary: Get competitive landscape
      description: Get agency + NAICS scoped market data with fallback for an opportunity.
      operationId: getCompetitiveLandscape
      parameters:
        - name: noticeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Competitive landscape data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitiveLandscapeDto"
        "401":
          description: Not authenticated
        "404":
          description: No competitive data available

  /v1/opportunities/{noticeId}/set-aside-shift:
    get:
      tags: [Opportunities]
      summary: Get set-aside shift analysis
      description: Compares current set-aside to predecessor contract for an opportunity.
      operationId: getSetAsideShift
      parameters:
        - name: noticeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Set-aside shift data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetAsideShiftDto"
        "401":
          description: Not authenticated
        "404":
          description: No predecessor data available

  /v1/opportunities/{noticeId}/qualification:
    get:
      tags: [Opportunities]
      summary: Run qualification checks
      description: Run qualification checks for an opportunity against the current organization's profile.
      operationId: checkQualification
      parameters:
        - name: noticeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Qualification check results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QualificationCheckDto"
        "401":
          description: Not authenticated

  /v1/opportunities/{noticeId}/document-intelligence:
    get:
      tags: [Opportunities]
      summary: Get document intelligence
      description: Get intelligence extracted from opportunity attachments (SOW, RFP, etc.).
      operationId: getDocumentIntelligence
      parameters:
        - name: noticeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document intelligence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentIntelligenceDto"
        "401":
          description: Not authenticated
        "404":
          description: No document intelligence available

  /v1/opportunities/{noticeId}/analyze:
    post:
      tags: [Opportunities]
      summary: Request attachment analysis
      description: Request AI analysis of opportunity attachments. Inserts a data_load_request for the Python pipeline.
      operationId: requestAnalysis
      parameters:
        - name: noticeId
          in: path
          required: true
          schema:
            type: string
        - name: tier
          in: query
          schema:
            type: string
            default: haiku
            enum: [haiku, sonnet]
      responses:
        "200":
          description: Load request status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoadRequestStatusDto"
        "401":
          description: Not authenticated

  /v1/opportunities/{noticeId}/fetch-description:
    post:
      tags: [Opportunities]
      summary: Fetch missing description from SAM.gov
      description: >
        Fetch a missing opportunity description from SAM.gov on demand. If already
        populated, returns the cached text without making an API call. Includes SSRF
        protection (blocks private IPs), HTML stripping, and DB caching.
      operationId: fetchDescription
      parameters:
        - name: noticeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Description text (cached or freshly fetched)
          content:
            application/json:
              schema:
                type: object
                properties:
                  noticeId:
                    type: string
                  descriptionText:
                    type: string
        "401":
          description: Not authenticated
        "404":
          description: Opportunity not found or not found on SAM.gov
        "502":
          description: Upstream SAM.gov call failed

  # ---------------------------------------------------------------------------
  # Awards
  # ---------------------------------------------------------------------------
  /v1/awards:
    get:
      tags: [Awards]
      summary: Search awards
      description: Search federal contract awards with filters and pagination.
      operationId: searchAwards
      parameters:
        - name: piid
          in: query
          schema:
            type: string
        - name: solicitation
          in: query
          schema:
            type: string
        - name: naics
          in: query
          schema:
            type: string
        - name: agency
          in: query
          schema:
            type: string
        - name: vendorUei
          in: query
          schema:
            type: string
        - name: vendorName
          in: query
          schema:
            type: string
        - name: setAside
          in: query
          schema:
            type: string
        - name: minValue
          in: query
          schema:
            type: number
            format: decimal
        - name: maxValue
          in: query
          schema:
            type: number
            format: decimal
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortDescending"
      responses:
        "200":
          description: Paged list of awards
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Not authenticated

  /v1/awards/market-share:
    get:
      tags: [Awards]
      summary: Get market share analysis
      description: Get market share analysis for a NAICS code showing top vendors.
      operationId: getMarketShare
      parameters:
        - name: naicsCode
          in: query
          required: true
          schema:
            type: string
        - name: years
          in: query
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 10
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Market share analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketShareAnalysisDto"
        "400":
          description: naicsCode is required
        "401":
          description: Not authenticated

  /v1/awards/expiring:
    get:
      tags: [Awards]
      summary: Get expiring contracts
      description: Get contracts nearing completion date, enriched with incumbent health and re-solicitation data.
      operationId: getExpiringContracts
      parameters:
        - name: monthsAhead
          in: query
          schema:
            type: integer
            default: 12
            minimum: 1
            maximum: 24
        - name: naicsCode
          in: query
          schema:
            type: string
        - name: setAsideType
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
            maximum: 10000
      responses:
        "200":
          description: List of expiring contracts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpiringContractDto"
        "401":
          description: Not authenticated

  /v1/awards/set-aside-trends/{naicsCode}:
    get:
      tags: [Awards]
      summary: Get set-aside trends
      description: Get set-aside trends by fiscal year for a NAICS code.
      operationId: getSetAsideTrends
      parameters:
        - name: naicsCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Set-aside trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SetAsideTrendDto"
        "400":
          description: naicsCode is required
        "401":
          description: Not authenticated

  /v1/awards/{contractId}:
    get:
      tags: [Awards]
      summary: Get award detail
      description: Get full detail for a contract award.
      operationId: getAwardDetail
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Award detail
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Not authenticated

  /v1/awards/{contractId}/burn-rate:
    get:
      tags: [Awards]
      summary: Get contract burn rate
      description: Get spending burn rate analysis for a contract.
      operationId: getBurnRate
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Burn rate data
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Not authenticated
        "404":
          description: Contract not found

  /v1/awards/{contractId}/load:
    post:
      tags: [Awards]
      summary: Request data load for a contract
      description: Request detailed data loading for a contract from external sources.
      operationId: requestAwardLoad
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestLoadDto"
      responses:
        "200":
          description: Load request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoadRequestStatusDto"
        "401":
          description: Not authenticated

  /v1/awards/{contractId}/load-status:
    get:
      tags: [Awards]
      summary: Get load request status
      description: Get the status of a data load request for a contract.
      operationId: getAwardLoadStatus
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Load request status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoadRequestStatusDto"
        "401":
          description: Not authenticated

  # ---------------------------------------------------------------------------
  # Entities
  # ---------------------------------------------------------------------------
  /v1/entities:
    get:
      tags: [Entities]
      summary: Search entities
      description: Search SAM.gov registered entities with filters and pagination.
      operationId: searchEntities
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: uei
          in: query
          schema:
            type: string
        - name: naics
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: businessType
          in: query
          schema:
            type: string
        - name: sbaCertification
          in: query
          schema:
            type: string
        - name: registrationStatus
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortDescending"
      responses:
        "200":
          description: Paged list of entities
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Not authenticated

  /v1/entities/{uei}:
    get:
      tags: [Entities]
      summary: Get entity detail
      description: Get full detail for an entity by UEI.
      operationId: getEntityDetail
      parameters:
        - name: uei
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entity detail
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Not authenticated
        "404":
          description: Entity not found

  /v1/entities/{uei}/competitor-profile:
    get:
      tags: [Entities]
      summary: Get competitor profile
      description: Get a competitor profile for an entity including contract history and certifications.
      operationId: getCompetitorProfile
      parameters:
        - name: uei
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Competitor profile
          content:
            application/json:
              schema:
                type: object
