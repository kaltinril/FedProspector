components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: httpOnly JWT cookie set by the login endpoint

  parameters:
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 25
        minimum: 1
        maximum: 100
    sortBy:
      name: sortBy
      in: query
      schema:
        type: string
    sortDescending:
      name: sortDescending
      in: query
      schema:
        type: boolean
        default: false

  schemas:
    # ------ Auth ------
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RegisterRequest:
      type: object
      required: [username, email, password, displayName]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        displayName:
          type: string
        inviteCode:
          type: string

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password

    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
        email:
          type: string
          format: email
        currentPassword:
          type: string
          format: password
          description: Required when changing email address

    AuthResult:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: string

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        userId:
          type: integer
        userName:
          type: string
        expiresAt:
          type: string
          format: date-time
        forcePasswordChange:
          type: boolean

    UserProfileDto:
      type: object
      properties:
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        role:
          type: string
        isOrgAdmin:
          type: boolean
        isSystemAdmin:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        forcePasswordChange:
          type: boolean

    # ------ Common ------
    ApiErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        detail:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        traceId:
          type: string

    PagedResponse:
      type: object
      properties:
        items:
          type: array
          items: {}
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer
        hasPreviousPage:
          type: boolean
        hasNextPage:
          type: boolean

    PagedOpportunitySearchResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer
        hasPreviousPage:
          type: boolean
        hasNextPage:
          type: boolean

    HealthComponent:
      type: object
      properties:
        status:
          type: string
          enum: [Healthy, Degraded, Unhealthy]
        description:
          type: string
        data:
          type: object
          additionalProperties: true

    # ------ Dashboard ------
    DashboardDto:
      type: object
      properties:
        statusCounts:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
              count:
                type: integer
        outcomeCounts:
          type: array
          items:
            type: object
            properties:
              outcome:
                type: string
              count:
                type: integer
        dueOpportunities:
          type: array
          items:
            type: object
        assigneeWorkloads:
          type: array
          items:
            type: object
        savedSearchSummaries:
          type: array
          items:
            type: object

    # ------ Intelligence ------
    PWinResultDto:
      type: object
      properties:
        prospectId:
          type: integer
        noticeId:
          type: string
        score:
          type: number
          format: decimal
        category:
          type: string
        factors:
          type: array
          items:
            $ref: "#/components/schemas/PWinFactorDto"
        suggestions:
          type: array
          items:
            type: string

    PWinFactorDto:
      type: object
      properties:
        name:
          type: string
        score:
          type: number
          format: decimal
        weight:
          type: number
          format: decimal
        weightedScore:
          type: number
          format: decimal
        detail:
          type: string

    BatchPWinRequest:
      type: object
      required: [noticeIds]
      properties:
        noticeIds:
          type: array
          items:
            type: string
          maxItems: 200

    BatchPWinResponse:
      type: object
      properties:
        results:
          type: object
          additionalProperties:
            type: object
            properties:
              score:
                type: number
                format: decimal
              category:
                type: string

    RecommendedOpportunityDto:
      type: object
      properties:
        noticeId:
          type: string
        title:
          type: string
        solicitationNumber:
          type: string
        departmentName:
          type: string
        subTier:
          type: string
        setAsideCode:
          type: string
        setAsideDescription:
          type: string
        naicsCode:
          type: string
        naicsDescription:
          type: string
        classificationCode:
          type: string
        noticeType:
          type: string
        awardAmount:
          type: number
          format: decimal
        postedDate:
          type: string
          format: date-time
        responseDeadline:
          type: string
          format: date-time
        daysRemaining:
          type: integer
        popState:
          type: string
        popCity:
          type: string
        popCountry:
          type: string
        qScore:
          type: number
          format: decimal
        qScoreCategory:
          type: string
        qScoreFactors:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              points:
                type: number
                format: decimal
              maxPoints:
                type: number
                format: decimal
        isRecompete:
          type: boolean
        incumbentName:
          type: string

    IncumbentAnalysisDto:
      type: object
      properties:
        noticeId:
          type: string
        hasIncumbent:
          type: boolean
        incumbentUei:
          type: string
        incumbentName:
          type: string
        contractId:
          type: string
        contractValue:
          type: number
          format: decimal
        dollarsObligated:
          type: number
          format: decimal
        periodStart:
          type: string
          format: date-time
        periodEnd:
          type: string
          format: date-time
        monthsRemaining:
          type: integer
        monthlyBurnRate:
          type: number
          format: decimal
        percentSpent:
          type: number
          format: decimal
        registrationStatus:
          type: string
        registrationExpiration:
          type: string
          format: date-time
        isExcluded:
          type: boolean
        exclusionType:
          type: string
        totalContractsInNaics:
          type: integer
        consecutiveWins:
          type: integer
        vulnerabilitySignals:
          type: array
          items:
            type: string
        isLikelyIncumbent:
          type: boolean
        likelyCompetitors:
          type: array
          items:
            type: object
            properties:
              vendorName:
                type: string
              ueiSam:
                type: string
              contractCount:
                type: integer
              totalValue:
