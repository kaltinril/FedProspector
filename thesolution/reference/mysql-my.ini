# FedProspect MySQL Configuration — Phase 66 Performance Tuning
# Copy this file to your MySQL installation directory as my.ini (Windows) or my.cnf (Linux)
# e.g. E:\mysql\my.ini or /etc/mysql/my.cnf
#
# Tuned for: MySQL 8.4 LTS, single-server dev/small-prod, bulk ETL workloads
# Based on: Percona best-practice recommendations + project-specific testing
#
# Adjust innodb_buffer_pool_size based on available RAM:
#   8 GB RAM  -> 2G   (buffer_pool_instances = 4)
#   16 GB RAM -> 4G   (buffer_pool_instances = 8)
#   32 GB RAM -> 8G   (buffer_pool_instances = 8)
#   64 GB RAM -> 16G  (buffer_pool_instances = 16)
# Rule of thumb: 25-50% of total system RAM on a shared machine,
# 50-70% on a dedicated database server.

[mysqld]

# ============================================================
# BUFFER POOL
# ============================================================
# Primary InnoDB cache. Holds data pages and index pages in memory.
# Larger = fewer disk reads. Most impactful single setting.
innodb_buffer_pool_size = 8G

# Split the buffer pool into multiple instances to reduce mutex contention.
# Rule: 1 instance per ~512MB of buffer pool. Must be >= 1.
innodb_buffer_pool_instances = 8

# ============================================================
# REDO LOG (Write-Ahead Log)
# ============================================================
# Controls how much uncommitted data can accumulate before a checkpoint flush.
# Default is 100MB — far too small for bulk loads; causes constant flushing.
# 2G allows long bursts of writes without checkpoint stalls.
# This is a DYNAMIC variable: can be changed at runtime with SET GLOBAL.
# MySQL 8.0.30+ replaced innodb_log_file_size with this single knob.
innodb_redo_log_capacity = 2G

# ============================================================
# I/O CAPACITY
# ============================================================
# Tells InnoDB how many IOPS the storage can handle.
# innodb_io_capacity: target IOPS for background tasks (flushing, merging).
# innodb_io_capacity_max: ceiling during urgent flushing (checkpoint pressure).
#
# Guidelines by storage type:
#   HDD (7200 RPM):  io_capacity = 200,   io_capacity_max = 400
#   SATA SSD:         io_capacity = 2000,  io_capacity_max = 4000
#   NVMe SSD:         io_capacity = 10000, io_capacity_max = 20000
#   Cloud (gp3/io2):  io_capacity = 3000,  io_capacity_max = 6000
innodb_io_capacity = 10000
innodb_io_capacity_max = 20000

# Read/write I/O threads for background operations.
# Default is 4 each. 8 better utilizes multi-core + fast storage.
innodb_read_io_threads = 8
innodb_write_io_threads = 8

# ============================================================
# INNODB OPTIMIZATIONS
# ============================================================
# Change buffering: caches secondary index changes when pages aren't in memory.
# On fast storage (SSD/NVMe), the buffering overhead exceeds the I/O cost.
# Set to 'none' to skip it entirely. (Default: 'all')
innodb_change_buffering = none

# Adaptive Hash Index: InnoDB builds in-memory hash indexes automatically.
# Can cause contention on btr_search_latch under concurrent bulk loads.
# Disabling is recommended for ETL-heavy workloads. (Default: ON)
# Monitor with SHOW ENGINE INNODB STATUS if unsure.
innodb_adaptive_hash_index = OFF

# Sort buffer used during CREATE INDEX and ALTER TABLE ... ADD INDEX.
# Larger = faster index builds during bulk load index recreation.
# Default is 1M; 4M is a good balance.
innodb_sort_buffer_size = 4M

# ============================================================
# TEMPORARY TABLES
# ============================================================
# Maximum size for in-memory temp tables (GROUP BY, DISTINCT, subqueries).
# When exceeded, MySQL spills to disk (much slower).
# Both must be set together — MySQL uses the SMALLER of the two.
# Default is 16M; 64M handles larger analytical queries in memory.
tmp_table_size = 64M
max_heap_table_size = 64M

# ============================================================
# CONNECTIONS
# ============================================================
# Maximum concurrent connections. Default is 151.
# Raised from 100 to 200 in Phase 117E to support parallel intel
# extraction via ProcessPoolExecutor: each worker process spins up
# its own pool (DB_POOL_SIZE=10 per worker), so 4 workers + parent
# + any ad-hoc tooling can exceed the default 100 ceiling.
# Each idle connection uses ~0.5-1MB; don't over-allocate.
max_connections = 200

# ============================================================
# UNDO LOG
# ============================================================
# Prevents undo tablespace from growing unbounded after large transactions.
# innodb_undo_log_truncate: enables automatic truncation of undo tablespaces.
# innodb_max_undo_log_size: triggers truncation when an undo tablespace exceeds this.
innodb_undo_log_truncate = ON
innodb_max_undo_log_size = 1G

# ============================================================
# SECURITY / FILE ACCESS
# ============================================================
# Allow LOAD DATA INFILE from any path (required for bulk ETL).
# On production, restrict to a specific directory.
secure-file-priv = ""

# ============================================================
# BINARY LOGGING
# ============================================================
# Disable binary logging (safe for single-server / dev setups with no replication).
# Eliminates binlog I/O overhead during bulk loads and prevents large binlog files.
# DO NOT use this if you have replication or point-in-time recovery requirements.
skip-log-bin
