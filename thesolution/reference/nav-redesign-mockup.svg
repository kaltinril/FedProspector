  <path d="M 975 685.5 L 989 685.5" stroke="#ffffff" stroke-width="2"/>

  <text x="776" y="706" font-size="9.5" font-weight="700" letter-spacing="1" fill="#94a3b8">ACCOUNT</text>
  <g font-size="12.5" fill="#1e293b">
