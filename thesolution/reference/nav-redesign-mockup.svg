  <text x="560" y="854" font-size="11.5" fill="#64748b">Hubs open as in-page tabbed workspaces; account &amp; utility items move under the avatar.</text>

  <!-- ============================================================= -->
  <!-- LEGEND / CALLOUT (full width, bottom)                          -->
  <!-- ============================================================= -->
  <rect x="40" y="1098" width="980" height="62" rx="10" fill="#0f172a"/>
  <rect x="40" y="1098" width="5" height="62" rx="2.5" fill="#1d4ed8"/>
  <text x="64" y="1122" font-size="13.5" font-weight="700" fill="#ffffff">The idea: ~42 rows &#8594; ~11. Nothing removed.</text>
  <text x="64" y="1141" font-size="11.5" fill="#cbd5e1">Destinations stay in the rail; tool-drawers become hubs with in-page tabs; account/utility items move to the avatar menu. Depth moves one level</text>
  <text x="64" y="1156" font-size="11.5" fill="#cbd5e1">down, reachable via hubs + a new command palette. The old Research &#8220;Teaming&#8221; link moved into the Teaming hub, renamed &#8220;Subaward Network&#8221; to kill the duplicate-word confusion.</text>
