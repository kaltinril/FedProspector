  <text x="996" y="533" font-size="15" font-weight="700" fill="#94a3b8" text-anchor="end">&#8250;</text>
  <text x="610" y="547" font-size="9.5" fill="#94a3b8">Partner Search · Mentor-Prot&#233;g&#233; · Gap Analysis · Subaward Network</text>

