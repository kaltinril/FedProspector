  <text x="40" y="72" font-size="14" fill="#64748b">A 3-tier reframe of the left rail. Design mockup only — no app code changes.</text>

  <!-- ===================== COLUMN TITLES ======================== -->
  <text x="40" y="118" font-size="16" font-weight="700" fill="#0f172a">Current</text>
  <text x="40" y="138" font-size="12" fill="#64748b">8 groups, 34 items (~42 rows)</text>

  <text x="560" y="118" font-size="16" font-weight="700" fill="#1d4ed8">Proposed</text>
  <text x="560" y="138" font-size="12" fill="#64748b">6 destinations + 5 hubs (~11 rows)</text>

  <!-- thin vertical divider between the two columns -->
