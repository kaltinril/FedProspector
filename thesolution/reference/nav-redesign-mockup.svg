<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1180" viewBox="0 0 1080 1180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- ============================================================= -->
  <!-- FedProspect — Navigation Redesign Mockup (before / after)     -->
  <!-- Design artifact only. Light MUI-style sidebars, side by side. -->
  <!-- ============================================================= -->

  <defs>
    <!-- soft drop shadow for the sidebar cards -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <!-- subtle shadow for the avatar popover -->
