  <text x="996" y="489" font-size="15" font-weight="700" fill="#94a3b8" text-anchor="end">&#8250;</text>
  <text x="610" y="503" font-size="9.5" fill="#94a3b8">Market Rates · Price-to-Win · Bid Scenarios · Escalation · IGCE · Sub Benchmarks · SCA Rates</text>

