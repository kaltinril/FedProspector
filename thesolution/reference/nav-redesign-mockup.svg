  <rect x="589" y="568" width="11" height="9" rx="2" fill="#1d4ed8"/>
  <text x="610" y="577" font-size="13" font-weight="600" fill="#0f172a">Market Intel</text>
  <text x="996" y="577" font-size="15" font-weight="700" fill="#94a3b8" text-anchor="end">&#8250;</text>
  <text x="610" y="591" font-size="9.5" fill="#94a3b8">Agency Patterns · Contracting Offices · Re-compete Candidates · Federal Hierarchy · NAICS Browser</text>

  <!-- Hub: Company & Eligibility -->
  <rect x="576" y="602" width="428" height="40" rx="7" fill="#f8fafc"/>
  <rect x="589" y="612" width="11" height="9" rx="2" fill="#1d4ed8"/>
  <text x="610" y="621" font-size="13" font-weight="600" fill="#0f172a">Company &amp; Eligibility</text>
  <text x="996" y="621" font-size="15" font-weight="700" fill="#94a3b8" text-anchor="end">&#8250;</text>
