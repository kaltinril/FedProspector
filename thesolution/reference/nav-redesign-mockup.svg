    <g><rect x="589" y="293" width="11" height="9" rx="2" fill="#94a3b8"/><text x="610" y="302">Prospects</text></g>
    <g><rect x="589" y="320" width="11" height="9" rx="2" fill="#94a3b8"/><text x="610" y="329">Opportunities</text></g>
    <g><rect x="589" y="347" width="11" height="9" rx="2" fill="#94a3b8"/><text x="610" y="356">Awards</text></g>
    <g><rect x="589" y="374" width="11" height="9" rx="2" fill="#94a3b8"/><text x="610" y="383">Entities</text></g>
  </g>

