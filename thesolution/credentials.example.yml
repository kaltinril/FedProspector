# Local Development Credentials Template
# Copy to credentials.yml and fill in real values
# credentials.yml is gitignored — never commit real credentials

mysql:
  host: localhost
  port: 3306
  root_user: root
  root_password: CHANGE_ME
  app_user: fed_app
  app_password: CHANGE_ME
  database: fed_contracts
  server_path: E:\mysql
  start_command: E:\mysql\bin\mysqld.exe --console --secure-file-priv=

sam_gov:
  api_key: SAM-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
  daily_limit: 10
  key_expires: ""
